<VirtualHost *:80>
    ServerName your-domain.com
    DocumentRoot /var/www/htr/backend/public

    <Directory /var/www/htr/backend/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/htr_error.log
    CustomLog ${APACHE_LOG_DIR}/htr_access.log combined
</VirtualHost>
