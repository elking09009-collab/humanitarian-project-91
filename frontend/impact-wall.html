<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>المجتمع والقصص — حياة أفضل</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
.wall-tabs{display:flex;gap:0;margin-bottom:24px;background:rgba(255,255,255,.7);border-radius:14px;padding:5px;width:fit-content;flex-wrap:wrap}
.wt-tab{padding:9px 22px;border-radius:10px;border:none;background:transparent;color:#555;font-weight:600;cursor:pointer;font-family:Poppins,sans-serif;font-size:.88rem;transition:.2s}
.wt-tab.active{background:#2e7d32;color:#fff;box-shadow:0 4px 14px rgba(46,125,50,.25)}
.story-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:28px}
.story-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.08);transition:.25s}
.story-card:hover{transform:translateY(-4px);box-shadow:0 8px 28px rgba(0,0,0,.14)}
.story-cover{height:160px;background:linear-gradient(135deg,#1b4332,#2e7d32);display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative}
.story-cat{position:absolute;top:12px;left:12px;background:rgba(0,0,0,.4);color:#fff;padding:4px 10px;border-radius:99px;font-size:.7rem;font-family:Poppins,sans-serif;backdrop-filter:blur(4px)}
.story-has-audio{position:absolute;top:12px;right:12px;background:#4ade80;color:#1a1a1a;padding:4px 10px;border-radius:99px;font-size:.7rem;font-family:Poppins,sans-serif;font-weight:700}
.story-body{padding:16px}
.story-title{font-size:.95rem;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.story-content{font-size:.83rem;color:#666;line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.story-footer{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:#999}
.like-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px solid #e5e7eb;border-radius:99px;padding:5px 12px;cursor:pointer;color:#555;transition:.2s;font-family:Poppins,sans-serif;font-size:.78rem}
.like-btn:hover{border-color:#dc2626;color:#dc2626}
.like-btn.liked{background:#fee2e2;border-color:#dc2626;color:#dc2626}
.audio-player{background:#f0fdf4;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.play-btn{width:34px;height:34px;border-radius:50%;background:#2e7d32;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;transition:.2s}
.play-btn:hover{background:#1b5e20}
.forum-list{margin-bottom:28px}
.forum-post{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:12px;border-right:4px solid #2e7d32;transition:.25s}
.forum-post:hover{box-shadow:0 6px 20px rgba(0,0,0,.12)}
.fp-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.fp-cat{padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:700;font-family:Poppins,sans-serif;background:#f0fdf4;color:#16a34a}
.fp-title{font-size:.95rem;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.fp-content{font-size:.83rem;color:#666;line-height:1.5;margin-bottom:8px}
.fp-meta{display:flex;gap:12px;font-size:.75rem;color:#aaa}
.cat-emoji{health:'🏥',education:'📚',food:'🍽️',housing:'🏠',livelihood:'💼',other:'✨'}
</style>
</head>
<body>
<div id="loading"><div class="loader"></div></div>

<div class="main-content">
  <div class="page-hero-mini" style="background:linear-gradient(135deg,rgba(5,46,22,.9),rgba(46,125,50,.85))">
    <i class="fas fa-heart-circle-plus hero-icon"></i>
    <h1>المجتمع والقصص</h1>
    <p>بودكاست الأثر — قصص حقيقية غيّرت حياة ناس | منتدى المتطوعين لتبادل الخبرات</p>
  </div>

  <div style="max-width:960px;margin:0 auto;padding:24px 20px 80px">
    <div class="wall-tabs">
      <button class="wt-tab active" onclick="showWall('stories',this)"><i class="fas fa-microphone-lines" style="margin-left:5px"></i> قصص الأثر</button>
      <button class="wt-tab" onclick="showWall('forum',this)"><i class="fas fa-comments" style="margin-left:5px"></i> منتدى المتطوعين</button>
      <button class="wt-tab" onclick="showWall('share',this)"><i class="fas fa-plus" style="margin-left:5px"></i> شارك قصتك</button>
    </div>

    <!-- Stories -->
    <div id="wallStories">
      <div id="storyGrid" class="story-grid">
        <div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">جاري التحميل...</div>
      </div>
    </div>

    <!-- Forum -->
    <div id="wallForum" style="display:none">
      <div id="forumList" class="forum-list">
        <div style="text-align:center;padding:40px;color:#999">جاري التحميل...</div>
      </div>
      <div class="glass-card" style="padding:24px">
        <h3 style="color:#2e7d32;margin-bottom:16px"><i class="fas fa-pen" style="margin-left:8px"></i> أضف منشوراً للمنتدى</h3>
        <form id="forumForm">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
            <div class="form-group"><label>العنوان *</label><input type="text" id="fTitle" required></div>
            <div class="form-group"><label>مدينتك</label><input type="text" id="fCity" placeholder="القاهرة..."></div>
            <div class="form-group"><label>التصنيف</label>
              <select id="fCat">
                <option value="logistics">لوجستيات التوصيل</option>
                <option value="medical">تجربة طبية</option>
                <option value="legal">إجراءات قانونية</option>
                <option value="experience">خبرة ميدانية</option>
                <option value="general">عام</option>
              </select></div>
          </div>
          <div class="form-group"><label>اسمك (اختياري)</label><input type="text" id="fAuthor" placeholder="أو اترك فارغاً للنشر مجهول"></div>
          <div class="form-group"><label>المحتوى *</label><textarea id="fContent" placeholder="شارك خبرتك الميدانية..." required></textarea></div>
          <button type="submit" class="submit-btn" style="max-width:200px"><i class="fas fa-paper-plane"></i> نشر المنشور</button>
        </form>
        <div id="forumMsg"></div>
      </div>
    </div>

    <!-- Share story -->
    <div id="wallShare" style="display:none">
      <div class="glass-card" style="padding:28px">
        <h3 style="color:#2e7d32;margin-bottom:6px"><i class="fas fa-microphone" style="margin-left:8px"></i> شارك قصتك مع المجتمع</h3>
        <p style="color:#888;font-size:.85rem;margin-bottom:18px">هل غيّرت المنصة حياتك؟ قصتك قد تُحرّك متبرعاً آخر</p>
        <form id="storyForm">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group"><label>عنوان قصتك *</label><input type="text" id="sTitle" required></div>
            <div class="form-group"><label>اسمك *</label><input type="text" id="sAuthor" required></div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
            <div class="form-group"><label>مدينتك</label><input type="text" id="sCity"></div>
            <div class="form-group"><label>التصنيف</label>
              <select id="sCat">
                <option value="health">صحة</option>
                <option value="education">تعليم</option>
                <option value="food">غذاء</option>
                <option value="housing">مسكن</option>
                <option value="livelihood">معيشة</option>
                <option value="other">أخرى</option>
              </select></div>
          </div>
          <div class="form-group"><label>قصتك *</label><textarea id="sContent" rows="5" placeholder="حدّثنا كيف غيّرت المنصة حياتك..." required></textarea></div>
          <button type="submit" class="submit-btn" style="max-width:220px"><i class="fas fa-heart"></i> شارك قصتك</button>
        </form>
        <div id="storyMsg"></div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="sidebar.js"></script>
<script>
const catEmoji = {health:'🏥',education:'📚',food:'🍽️',housing:'🏠',livelihood:'💼',other:'✨'};
const catLabel = {health:'صحة',education:'تعليم',food:'غذاء',housing:'مسكن',livelihood:'معيشة',other:'أخرى'};
const forumCatLabel = {logistics:'لوجستيات',medical:'طبي',legal:'قانوني',experience:'خبرة',general:'عام'};

function showWall(name, btn) {
  document.querySelectorAll('.wt-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('wallStories').style.display = name==='stories' ? 'block':'none';
  document.getElementById('wallForum').style.display   = name==='forum'   ? 'block':'none';
  document.getElementById('wallShare').style.display   = name==='share'   ? 'block':'none';
  if (name==='forum') loadForum();
}

async function loadStories() {
  const data = await apiRequest('/stories');
  const stories = data?.data || (Array.isArray(data)?data:[]);
  if (!stories.length) {
    document.getElementById('storyGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999"><i class="fas fa-microphone" style="font-size:2.5rem;display:block;margin-bottom:12px;color:#2e7d32"></i> لم تُشارَك قصص بعد — كن أول من يُلهم الآخرين</div>`;
    return;
  }
  document.getElementById('storyGrid').innerHTML = stories.map(s => `
    <div class="story-card">
      <div class="story-cover">
        ${catEmoji[s.category]||'✨'}
        <div class="story-cat">${catLabel[s.category]||'أخرى'}</div>
        ${s.audio_url ? '<div class="story-has-audio"><i class="fas fa-headphones"></i> بودكاست</div>' : ''}
      </div>
      <div class="story-body">
        ${s.audio_url ? `
        <div class="audio-player">
          <button class="play-btn" onclick="toggleAudio('${s.audio_url}','audio_${s.id}',this)"><i class="fas fa-play"></i></button>
          <div style="flex:1">
            <div style="font-size:.75rem;font-weight:600;color:#2e7d32">استمع للقصة</div>
            <audio id="audio_${s.id}" src="${s.audio_url}" preload="none"></audio>
          </div>
        </div>` : ''}
        <div class="story-title">${s.title}</div>
        <div class="story-content">${s.content}</div>
        <div class="story-footer">
          <div style="display:flex;align-items:center;gap:6px"><i class="fas fa-user-circle" style="color:#2e7d32"></i> ${s.author_name}${s.city?` — ${s.city}`:''}</div>
          <button class="like-btn" id="like_${s.id}" onclick="likeStory(${s.id},this)">
            <i class="fas fa-heart"></i> <span>${s.likes_count||0}</span>
          </button>
        </div>
      </div>
    </div>`).join('');
}

function toggleAudio(url, audioId, btn) {
  const audio = document.getElementById(audioId);
  if (audio.paused) { audio.play(); btn.innerHTML='<i class="fas fa-pause"></i>'; }
  else { audio.pause(); btn.innerHTML='<i class="fas fa-play"></i>'; }
}

async function likeStory(id, btn) {
  const res = await apiRequest(`/stories/${id}/like`, 'POST', {});
  if (res.likes !== undefined) {
    btn.querySelector('span').textContent = res.likes;
    btn.classList.add('liked');
  }
}

async function loadForum() {
  const data = await apiRequest('/forum');
  const posts = data?.data || (Array.isArray(data)?data:[]);
  if (!posts.length) {
    document.getElementById('forumList').innerHTML = `<div style="text-align:center;padding:40px;color:#999">لا توجد منشورات بعد — ابدأ النقاش</div>`;
    return;
  }
  document.getElementById('forumList').innerHTML = posts.map(p => `
    <div class="forum-post">
      <div class="fp-header">
        <div style="flex:1">
          <div class="fp-title">${p.title}</div>
          <div style="font-size:.75rem;color:#888">${p.author_name||'مجهول'} ${p.city?`— ${p.city}`:''}</div>
        </div>
        <span class="fp-cat">${forumCatLabel[p.category]||'عام'}</span>
      </div>
      <div class="fp-content">${p.content}</div>
      <div class="fp-meta">
        <span><i class="fas fa-comment"></i> ${p.replies_count||0} رد</span>
        <span><i class="fas fa-eye"></i> ${p.views_count||0} مشاهدة</span>
        <span><i class="fas fa-clock"></i> ${new Date(p.created_at).toLocaleDateString('ar-EG')}</span>
      </div>
    </div>`).join('');
}

document.getElementById('forumForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const res = await apiRequest('/forum', 'POST', {
    title: document.getElementById('fTitle').value,
    content: document.getElementById('fContent').value,
    city: document.getElementById('fCity').value,
    category: document.getElementById('fCat').value,
    author_name: document.getElementById('fAuthor').value||'متطوع مجهول',
  });
  const msg = document.getElementById('forumMsg');
  if (res.message) {
    msg.innerHTML = `<div class="alert-success" style="margin-top:12px"><i class="fas fa-check-circle"></i> ${res.message}</div>`;
    this.reset(); setTimeout(loadForum,1200);
  }
});

document.getElementById('storyForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const res = await apiRequest('/forum', 'POST', {
    title: document.getElementById('sTitle').value,
    content: document.getElementById('sContent').value,
    city: document.getElementById('sCity').value,
    category: document.getElementById('sCat').value,
    author_name: document.getElementById('sAuthor').value,
  });
  const msg = document.getElementById('storyMsg');
  if (res.message) {
    msg.innerHTML = `<div class="alert-success" style="margin-top:12px"><i class="fas fa-heart"></i> شكراً — قصتك ستُلهم الآخرين</div>`;
    this.reset();
  }
});

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('loading').style.display = 'none';
  await loadStories();
});
</script>
</body>
</html>
