 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="form-page">

<div class="main-content">

<div class="form-container">

<h2>تسجيل الدخول</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="البريد الإلكتروني" required>
<input type="password" id="password" placeholder="كلمة المرور" required>

<button type="submit">دخول</button>

</form>

<div style="margin-top:14px;padding:12px;border:1px solid #ddd;border-radius:10px;background:#fafafa;line-height:1.8;">
  <strong>بيانات دخول الأدمن:</strong><br>
  البريد الإلكتروني: <span id="adminEmailText">admin@humanitarian.local</span><br>
  كلمة المرور: <span id="adminPasswordText">admin1234</span><br>
  <button id="fillAdminBtn" type="button" style="margin-top:8px;">تعبئة بيانات الأدمن تلقائيًا</button>
</div>

<div id="demoBox" style="display:none;margin-top:14px;padding:14px;border:2px solid #f59e0b;border-radius:10px;background:#fffbeb;text-align:center;">
  <p style="font-size:0.87rem;color:#92400e;margin-bottom:10px;">
    <strong>⚠️ الخادم غير متاح حالياً</strong><br>
    يمكنك تجربة لوحة التحكم بالوضع التجريبي
  </p>
  <button id="demoLoginBtn" type="button"
    style="background:#f59e0b;color:#000;border:none;padding:10px 22px;border-radius:8px;font-size:0.9rem;font-weight:700;cursor:pointer;width:100%;">
    🎭 دخول كأدمن (عرض تجريبي)
  </button>
</div>

<script>
document.getElementById("demoLoginBtn")?.addEventListener("click", function() {
  localStorage.setItem("user", JSON.stringify({ name: "Admin", email: "admin@humanitarian.local", role: "admin" }));
  localStorage.setItem("authToken", "demo-token");
  window.location.href = "admin-demo.html";
});
</script>

<p style="text-align:center;margin-top:16px;">
  ليس لديك حساب؟ <a href="register.html">أنشئ حساباً</a>
</p>

<p style="text-align:center;margin-top:8px;">
  <a href="request-status.html">متابعة حالة طلب إنشاء الحساب</a>
</p>

<a href="index.html" class="back-btn">رجوع للرئيسية</a>

</div>

<script src="script.js"></script>
<script src="sidebar.js"></script>
</div>
</body>
</html>
