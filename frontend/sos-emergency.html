<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>زر الطوارئ — حياة أفضل</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
.sos-banner{background:linear-gradient(90deg,#7f1d1d,#dc2626,#7f1d1d);background-size:200%;animation:bannerPulse 2s ease-in-out infinite;padding:14px 24px;text-align:center;color:#fff;font-weight:700;font-size:1rem;letter-spacing:.5px;position:sticky;top:0;z-index:100}
@keyframes bannerPulse{0%,100%{background-position:0%}50%{background-position:100%}}
.sos-banner i{margin-left:8px;animation:shake .6s ease infinite}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.emergency-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:32px}
.emergency-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(220,38,38,.12);border-right:5px solid #dc2626;transition:.3s}
.emergency-card.pinned{border-right-color:#f59e0b;box-shadow:0 4px 24px rgba(245,158,11,.2)}
.emergency-card:hover{transform:translateY(-3px)}
.ec-header{background:linear-gradient(135deg,#7f1d1d,#dc2626);padding:16px 20px;color:#fff;display:flex;justify-content:space-between;align-items:flex-start}
.ec-header.pinned{background:linear-gradient(135deg,#78350f,#f59e0b)}
.ec-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.ec-area{font-size:.78rem;opacity:.85}
.ec-badge{background:rgba(255,255,255,.2);padding:4px 10px;border-radius:99px;font-size:.72rem;font-family:Poppins,sans-serif;white-space:nowrap}
.ec-body{padding:16px 20px}
.ec-desc{font-size:.88rem;color:#555;margin-bottom:12px;line-height:1.6}
.ec-meta{display:flex;gap:16px;margin-bottom:12px;font-size:.8rem;color:#888;flex-wrap:wrap}
.ec-meta span i{margin-left:4px;color:#dc2626}
.ec-progress-wrap{margin-bottom:12px}
.ec-progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:#888;margin-bottom:4px}
.ec-bar{height:8px;border-radius:99px;background:#fee2e2;overflow:hidden}
.ec-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#dc2626,#f87171);transition:width .8s}
.ec-fill.full{background:linear-gradient(90deg,#16a34a,#4ade80)}
.ec-actions{display:flex;gap:8px;flex-wrap:wrap}
.ec-donate-btn{flex:1;padding:10px;border:none;border-radius:10px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-weight:700;cursor:pointer;font-family:Poppins,sans-serif;font-size:.85rem;transition:.2s}
.ec-donate-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(220,38,38,.35)}
.ec-donate-btn:disabled{background:#e5e7eb;color:#9ca3af;cursor:default;transform:none;box-shadow:none}
.ec-share-btn{padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;color:#555;cursor:pointer;font-size:.85rem;transition:.2s}
.ec-share-btn:hover{border-color:#dc2626;color:#dc2626}
.countdown{font-family:Poppins,sans-serif;font-size:.78rem;color:#dc2626;font-weight:600}
/* Donate quick-modal */
.quick-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9900;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.quick-modal-inner{background:#fff;border-radius:20px;padding:28px;max-width:400px;width:90%;text-align:center}
.quick-modal-inner h3{color:#dc2626;margin-bottom:16px}
.quick-amounts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.qa-btn{padding:8px 18px;border-radius:99px;border:2px solid rgba(220,38,38,.3);background:#fff;color:#dc2626;font-weight:700;cursor:pointer;font-size:.88rem;transition:.2s}
.qa-btn:hover,.qa-btn.sel{background:#dc2626;color:#fff;border-color:#dc2626}
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.12);border-radius:12px;padding:16px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:800;color:#dc2626;font-family:Poppins,sans-serif}
.stat-lbl{font-size:.78rem;color:#888}
</style>
</head>
<body>
<div id="loading"><div class="loader"></div></div>

<div class="sos-banner">
  <i class="fas fa-siren-on"></i> الاستجابة السريعة — حالات طارئة تحتاج تدخلك الآن
</div>

<div class="main-content">
  <div class="page-hero-mini" style="background:linear-gradient(135deg,rgba(80,0,0,.92),rgba(180,0,0,.88))">
    <i class="fas fa-triangle-exclamation hero-icon" style="filter:drop-shadow(0 0 22px #fca5a5)"></i>
    <h1>زر الطوارئ — SOS</h1>
    <p>حالات حرجة تحتاج تمويلاً فورياً — كل دقيقة تأخير قد تكون حياة</p>
  </div>

  <div style="max-width:1000px;margin:0 auto;padding:24px 20px 80px">
    <!-- Stats -->
    <div class="stats-strip" id="sosStats">
      <div class="stat-card"><div class="stat-num" id="statActive">…</div><div class="stat-lbl">حالة نشطة</div></div>
      <div class="stat-card"><div class="stat-num" id="statFunded">…</div><div class="stat-lbl">حالة اكتمل تمويلها</div></div>
      <div class="stat-card"><div class="stat-num" id="statTotal">…</div><div class="stat-lbl">إجمالي ما جُمع</div></div>
    </div>

    <!-- Cases grid -->
    <div id="emergencyGrid" class="emergency-grid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:#999">جاري التحميل...</div>
    </div>

    <!-- Report new case -->
    <div class="glass-card" style="padding:28px;margin-top:8px">
      <h3 style="color:#dc2626;margin-bottom:16px"><i class="fas fa-plus-circle" style="margin-left:8px"></i> الإبلاغ عن حالة طارئة</h3>
      <form id="reportForm">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group"><label>عنوان الحالة *</label><input type="text" id="eTitle" placeholder="مثال: عملية جراحية عاجلة لطفل" required></div>
          <div class="form-group"><label>نوع الحالة *</label>
            <select id="eType">
              <option value="surgery">عملية جراحية</option>
              <option value="fire">حريق/كارثة</option>
              <option value="flood">فيضان</option>
              <option value="accident">حادث</option>
              <option value="displacement">تهجير</option>
              <option value="other">أخرى</option>
            </select></div>
        </div>
        <div class="form-group"><label>تفاصيل الحالة *</label><textarea id="eDesc" placeholder="اشرح الحالة بالتفصيل..." required></textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
          <div class="form-group"><label>المبلغ المطلوب (ج.م) *</label><input type="number" id="eAmount" min="100" placeholder="5000" required></div>
          <div class="form-group"><label>المنطقة</label><input type="text" id="eArea" placeholder="القاهرة / الجيزة..."></div>
          <div class="form-group"><label>رقم التواصل</label><input type="tel" id="eContact" placeholder="01xxxxxxxxx"></div>
        </div>
        <button type="submit" class="submit-btn" style="max-width:220px;background:linear-gradient(135deg,#dc2626,#b91c1c)">
          <i class="fas fa-paper-plane"></i> إرسال البلاغ
        </button>
      </form>
      <div id="reportMsg"></div>
    </div>
  </div>
</div>

<!-- Quick donate modal -->
<div class="quick-modal" id="quickModal">
  <div class="quick-modal-inner">
    <div style="font-size:2rem;margin-bottom:8px">🆘</div>
    <h3 id="modalCaseTitle">تبرع للحالة</h3>
    <p style="color:#888;font-size:.85rem;margin-bottom:16px" id="modalCaseRemaining"></p>
    <div class="quick-amounts">
      <button class="qa-btn" onclick="setQA(50,this)">٥٠</button>
      <button class="qa-btn" onclick="setQA(100,this)">١٠٠</button>
      <button class="qa-btn" onclick="setQA(200,this)">٢٠٠</button>
      <button class="qa-btn" onclick="setQA(500,this)">٥٠٠</button>
      <button class="qa-btn" onclick="setQA(1000,this)">١٠٠٠</button>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <input type="number" id="qaCustom" placeholder="مبلغ مخصص (ج.م)" min="1">
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="submit-btn" onclick="confirmDonate()" style="max-width:160px;background:linear-gradient(135deg,#dc2626,#b91c1c)">تبرع الآن</button>
      <button onclick="closeQModal()" style="padding:10px 20px;border-radius:12px;border:2px solid #e5e7eb;background:#fff;cursor:pointer;font-family:Poppins,sans-serif">إلغاء</button>
    </div>
    <div id="qModalMsg" style="margin-top:10px;font-size:.88rem"></div>
  </div>
</div>

<script src="script.js"></script>
<script src="sidebar.js"></script>
<script>
let cases = [];
let selectedCaseId = null;
let qaAmount = 0;

const typeLabels = {surgery:'عملية جراحية',fire:'حريق',flood:'فيضان',accident:'حادث',displacement:'تهجير',other:'طارئة'};

async function loadCases() {
  const data = await apiRequest('/emergency');
  cases = Array.isArray(data) ? data : (data.data || []);

  // stats
  document.getElementById('statActive').textContent = cases.filter(c=>c.status==='urgent').length;
  document.getElementById('statFunded').textContent = cases.filter(c=>c.status==='funded').length;
  const total = cases.reduce((s,c)=>s+parseFloat(c.current_amount||0),0);
  document.getElementById('statTotal').textContent = total.toLocaleString('ar-EG') + ' ج.م';

  if (!cases.length) {
    document.getElementById('emergencyGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#16a34a"><i class="fas fa-circle-check" style="font-size:2.5rem;margin-bottom:12px;display:block"></i> لا توجد حالات طارئة نشطة الآن — الحمد لله</div>`;
    return;
  }

  document.getElementById('emergencyGrid').innerHTML = cases.map(c => {
    const pct = Math.min(100, c.progress || 0);
    const pinned = c.is_pinned ? 'pinned' : '';
    const deadline = c.deadline ? new Date(c.deadline).toLocaleDateString('ar-EG') : null;
    const remaining = parseFloat(c.remaining || (c.needed_amount - c.current_amount)).toLocaleString('ar-EG');
    const funded = c.status === 'funded';
    return `
    <div class="emergency-card ${pinned}">
      <div class="ec-header ${pinned}">
        <div>
          <div class="ec-title">${c.is_pinned?'📌 ':''}${c.title}</div>
          <div class="ec-area"><i class="fas fa-location-dot"></i> ${c.area || 'غير محدد'}</div>
        </div>
        <div class="ec-badge">${typeLabels[c.type]||'طارئة'}</div>
      </div>
      <div class="ec-body">
        <div class="ec-desc">${c.description}</div>
        <div class="ec-meta">
          <span><i class="fas fa-bullseye"></i> المطلوب: ${parseFloat(c.needed_amount).toLocaleString('ar-EG')} ج.م</span>
          <span><i class="fas fa-hand-holding-dollar"></i> جُمع: ${parseFloat(c.current_amount).toLocaleString('ar-EG')} ج.م</span>
          ${deadline ? `<span class="countdown"><i class="fas fa-clock"></i> ${deadline}</span>` : ''}
        </div>
        <div class="ec-progress-wrap">
          <div class="ec-progress-label"><span>${pct}%</span><span>متبقي: ${remaining} ج.م</span></div>
          <div class="ec-bar"><div class="ec-fill${funded?' full':''}" style="width:${pct}%"></div></div>
        </div>
        <div class="ec-actions">
          <button class="ec-donate-btn" onclick="openDonate(${c.id},'${c.title}',${remaining.replace(/,/g,'')})" ${funded?'disabled':''}>
            ${funded ? '✅ اكتمل التمويل' : '<i class="fas fa-heart"></i> تبرع الآن'}
          </button>
          <button class="ec-share-btn" onclick="shareCase('${c.title}',${c.needed_amount},${c.current_amount})">
            <i class="fas fa-share-nodes"></i>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openDonate(id, title, remaining) {
  selectedCaseId = id;
  qaAmount = 0;
  document.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('qaCustom').value = '';
  document.getElementById('modalCaseTitle').textContent = title;
  document.getElementById('modalCaseRemaining').textContent = `متبقي: ${parseFloat(remaining).toLocaleString('ar-EG')} ج.م`;
  document.getElementById('qModalMsg').textContent = '';
  document.getElementById('quickModal').style.display = 'flex';
}

function setQA(val, btn) {
  document.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
  qaAmount = val;
  document.getElementById('qaCustom').value = '';
}

async function confirmDonate() {
  const custom = parseFloat(document.getElementById('qaCustom').value);
  const amount = custom > 0 ? custom : qaAmount;
  if (!amount || amount < 1) { document.getElementById('qModalMsg').textContent = 'يرجى إدخال مبلغ'; return; }
  const res = await apiRequest(`/emergency/${selectedCaseId}/donate`, 'POST', { amount });
  document.getElementById('qModalMsg').innerHTML = `<span style="color:#16a34a">${res.message || 'تم بنجاح ✅'}</span>`;
  setTimeout(() => { closeQModal(); loadCases(); }, 1800);
}

function closeQModal() { document.getElementById('quickModal').style.display='none'; }
document.getElementById('quickModal').addEventListener('click', e => { if(e.target===document.getElementById('quickModal')) closeQModal(); });

function shareCase(title, needed, current) {
  const text = `🆘 حالة طارئة تحتاج مساعدتك\n${title}\nالمطلوب: ${parseFloat(needed).toLocaleString('ar-EG')} ج.م | جُمع: ${parseFloat(current).toLocaleString('ar-EG')} ج.م\n\nمنصة حياة أفضل`;
  navigator.clipboard?.writeText(text).then(()=>alert('تم نسخ تفاصيل الحالة'));
}

document.getElementById('reportForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const body = {
    title: document.getElementById('eTitle').value,
    type: document.getElementById('eType').value,
    description: document.getElementById('eDesc').value,
    needed_amount: parseFloat(document.getElementById('eAmount').value),
    area: document.getElementById('eArea').value,
    contact_info: document.getElementById('eContact').value,
  };
  const res = await apiRequest('/emergency', 'POST', body);
  const msg = document.getElementById('reportMsg');
  if (res.message) {
    msg.innerHTML = `<div class="alert-success" style="margin-top:12px"><i class="fas fa-check-circle"></i> ${res.message}</div>`;
    this.reset();
    setTimeout(loadCases, 1500);
  } else {
    msg.innerHTML = `<div style="color:#dc2626;margin-top:10px">حدث خطأ — تأكد من تشغيل الخادم</div>`;
  }
});

// Seed demo data if empty
async function seedIfEmpty() {
  const data = await apiRequest('/emergency');
  if (!data || (Array.isArray(data) && data.length === 0)) {
    const demos = [
      { title:'عملية قلب مفتوح لطفل (٤ سنوات)', type:'surgery', description:'الطفل أحمد يحتاج عملية قلب مفتوح عاجلة في مستشفى القلب التخصصي — عائلته غير قادرة على التكلفة.', needed_amount:25000, current_amount:14500, area:'القاهرة', contact_info:'01012345678', is_pinned:true },
      { title:'إخلاء عائلة بعد حريق منزل', type:'fire', description:'احترق منزل عائلة من 6 أفراد في بولاق الدكرور — يحتاجون بدل إيجار وأثاث أساسي.', needed_amount:8000, current_amount:3200, area:'الجيزة', contact_info:'01198765432' },
      { title:'إسعاف طارئ لمريضة سرطان', type:'other', description:'السيدة فاطمة تحتاج جلسات كيماوي فورية — حالتها حرجة والأسرة مُعدمة.', needed_amount:12000, current_amount:7800, area:'الإسكندرية', contact_info:'01234567890' },
    ];
    for (const d of demos) {
      await apiRequest('/emergency', 'POST', d).catch(()=>{});
    }
    await loadCases();
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('loading').style.display = 'none';
  await loadCases();
  if (!cases.length) await seedIfEmpty();
});
</script>
</body>
</html>
