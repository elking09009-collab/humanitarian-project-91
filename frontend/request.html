 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقديم طلب</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="sidebar.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="request-page">

<div class="main-content request-main">

<div class="form-container">

<h2>تقديم طلب مساعدة</h2>

<form id="requestForm">

<select id="area" required>
<option value="">اختر المنطقة</option>
</select>

<select id="need" required>
<option value="">اختر نوع الاحتياج</option>
<option value="food">طعام</option>
<option value="medicine">علاج</option>
<option value="shelter">مسكن</option>
<option value="water">مياه</option>
<option value="other">أخرى</option>
</select>

<input type="number" id="quantity" placeholder="عدد الأفراد" min="1" required>

<textarea id="notes" placeholder="وصف الحالة" required></textarea>

<input type="text" id="location" placeholder="الموقع" required>

<button type="button" onclick="getLocation()">📍 تحديد موقعي</button>

<button type="submit">إرسال الطلب</button>

</form>

<a href="index.html" class="back-btn">رجوع للرئيسية</a>

</div>

<script src="script.js"></script>
<script src="sidebar.js"></script>
</div>
</body>
</html>
