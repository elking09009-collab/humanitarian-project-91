<!DOCTYPE html>
<html lang="ar">
<head>

  <link rel="stylesheet" href="style.css">

<body>

 
<div class="main-content">


  <section class="donation-header">

<option value="money.html">التبرع بالمال</option>

<option value="food.html">تبرع بالطعام</option>
<option value="medicine.html">تبرع بالأدوية</option>

</section>

  
  <footer>
